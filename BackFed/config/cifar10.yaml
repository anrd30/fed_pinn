---
# *Default configuration to simplify experiment setup
defaults:
  - base # Inherit from base config
  - atk_config: cifar10_multishot
  - _self_ # This ensures your config overrides the base config

# *Aggregator
aggregator: triple_threat
checkpoint: Null

# *Specify if the attack is enabled
no_attack: False

# *Training mode
training_mode: sequential # Choose from [parallel, sequential] (sequential for Windows compatibility)

# *Debug mode (Not works for non-IID datasets (FEMNIST, REDDIT, SENTIMENT140))
debug: False
debug_fraction_data: 0.1 # Only use a portion of the data in debug mode

# *Resource configuration for each client
cuda_visible_devices: "0"
num_cpus: 1
num_gpus: 0.5

# *Simulation configuration
num_rounds: 600
num_clients: 100
num_clients_per_round: 10
federated_evaluation: False # Whether to perform federated evaluation (evaluate global model on client's validation set)
federated_val_split: 0.0 # Validation split for each client's dataset (should be > 0 if federated evaluation is True)

# *Dataset distribution configuration
dataset: CIFAR10 # CIFAR10, CIFAR100, TinyImageNet, MNIST
datapath: data
task: classification
partitioner: dirichlet # Choose from [uniform, dirichlet]
alpha: 0.9 # Dirichlet distribution parameter
normalize: True # Normalize the dataset

# *Model configuration
model: ResNet18
num_classes: 10

# *Test configuration
test_batch_size: 2048
num_workers: 0 # Number of workers for dataloader (set to 0 for Windows compatibility)
pin_memory: True
test_every: 1 # Test every x rounds

# *Default local training configuration (passed to clients during training)
client_config:
  # Training configuration
  local_epochs: 2
  batch_size: 64
  optimizer: sgd # Choose from the key in optimizer section below. Will be overridden to store DictConfig in client_optimizer_config
  lr: 0.1
  weight_decay: 5e-4

########################################################
# *Aggregator configuration (overrides base.yaml)
aggregator_config:  
  robustlr:
    _target_: backfed.servers.RobustLRServer
    robustLR_threshold: 4
    eta: 0.5

  norm_clipping:
    _target_: backfed.servers.NormClippingServer
    clipping_norm: 1.0
    eta: 0.5

  weakdp:
    _target_: backfed.servers.WeakDPServer
    std_dev: 0.025
    clipping_norm: 3.0
    eta: 0.5

  crfl:
    _target_: backfed.servers.CRFLServer
    strategy: unweighted_fedavg
    std_dev: 0.025
    clipping_norm: 3.0
    eta: 0.5
    test_sigma: 0.025
    N_m: 100
  
  krum:
    _target_: backfed.servers.KrumServer
    eta: 0.5
    
  multi_krum:
    _target_: backfed.servers.MultiKrumServer
    oracle: False # If true, we assume the number of malicious clients is known
    num_malicious_clients: 2 
    eta: 0.5

  bulyan:
    _target_: backfed.servers.BulyanServer
    oracle: False # If true, we assume the number of malicious clients is known
    num_malicious_clients: 2 # Number of malicious clients to tolerate
  
  ad_multi_krum:
    _target_: backfed.servers.ADMultiKrumServer # Multi-krum initialized as AnomalyDetectionServer
    eta: 0.5
  
  alignins:
    _target_: backfed.servers.AlignInsServer
    sparsity: 0.3
    lambda_s: 1.0
    lambda_c: 1.0
    eta: 0.5

  snowball:
    _target_: backfed.servers.SnowballServer
    ct: 2  # Cluster threshold
    vae_initial_epochs: 450  # Initial VAE training epochs (450)
    vae_tuning_epochs: 50  # VAE tuning epochs (50)
    vae_latent_dim: 64  # Latent dimension
    vae_hidden_dim: 256  # Hidden dimension
    vae_threshold: 0.5  # Threshold for benign set size
    vae_step: 0.1  # Step size for iterative expansion (1 client per step)
    warmup_rounds: 0  # Warmup rounds for CIFAR-10 (reference uses 100 but we evaluate on pretrained model)
    eta: 0.5
